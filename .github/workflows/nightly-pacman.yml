name: Nightly Pacman Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: pacman-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pacman-package:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed git rust gtk4 libadwaita libx11 libxtst namcap desktop-file-utils

      - name: Create unprivileged build user
        run: useradd -m builder

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare unprivileged build workspace
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"
          install -d -o builder -g builder /home/builder/.cache/makepkg
          install -o builder -g builder -m644 packaging/pacman/PKGBUILD PKGBUILD
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: makepkg
        run: |
          su - builder -c "cd '$GITHUB_WORKSPACE' && BUILDDIR=/home/builder/.cache/makepkg makepkg --noconfirm --clean"
          rm PKGBUILD

      - name: Validate package
        id: package
        run: |
          set -- "$GITHUB_WORKSPACE"/lan-mouse-*.pkg.tar.zst
          if [ "$#" -eq 1 ] && [ ! -f "$1" ]; then
            set --
          fi
          if [ "$#" -ne 1 ] || [ ! -f "$1" ]; then
            echo "Expected exactly one release package, found $#" >&2
            exit 1
          fi
          package=$1

          project_version=$(awk -F'"' '/^\[package\]/{p=1} p && /^version/{print $2; exit}' Cargo.toml)
          expected_version="${project_version}.r$(git rev-list --count HEAD).g$(git rev-parse --short HEAD)-1"
          actual_version=$(bsdtar -xOf "$package" .PKGINFO | sed -n 's/^pkgver = //p')
          if [ "$actual_version" != "$expected_version" ]; then
            echo "Unexpected package version: $actual_version (expected $expected_version)" >&2
            exit 1
          fi

          for entry in \
            usr/bin/lan-mouse \
            usr/lib/systemd/user/lan-mouse.service \
            usr/lib/firewalld/services/lan-mouse.xml \
            usr/share/applications/de.feschber.LanMouse.desktop \
            usr/share/icons/hicolor/scalable/apps/de.feschber.LanMouse.svg
          do
            if ! bsdtar -tf "$package" | grep -qx "$entry"; then
              echo "Missing package entry: $entry" >&2
              exit 1
            fi
          done

          pacman -Qip "$package"
          desktop-file-validate de.feschber.LanMouse.desktop
          target/release/lan-mouse --version

          namcap "$package" 2>&1 | tee /tmp/namcap.log
          if grep -q ' E: ' /tmp/namcap.log; then
            echo "namcap reported packaging errors" >&2
            exit 1
          fi

          echo "path=$(basename "$package")" >> "$GITHUB_OUTPUT"

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: lan-mouse-x86_64-pacman
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error
