name: Nightly Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pacman-package:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed git rust gtk4 libadwaita libx11 libxtst namcap desktop-file-utils

      - name: Create unprivileged build user
        run: useradd -m builder

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare unprivileged build workspace
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"
          install -d -o builder -g builder /home/builder/.cache/makepkg
          install -o builder -g builder -m644 packaging/pacman/PKGBUILD PKGBUILD
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: makepkg
        run: |
          su - builder -c "cd '$GITHUB_WORKSPACE' && BUILDDIR=/home/builder/.cache/makepkg makepkg --noconfirm --clean"
          rm PKGBUILD

      - name: Validate package
        id: package
        run: |
          set -- "$GITHUB_WORKSPACE"/lan-mouse-*.pkg.tar.zst
          if [ "$#" -eq 1 ] && [ ! -f "$1" ]; then
            set --
          fi
          if [ "$#" -ne 1 ] || [ ! -f "$1" ]; then
            echo "Expected exactly one release package, found $#" >&2
            exit 1
          fi
          package=$1

          project_version=$(awk -F'"' '/^\[package\]/{p=1} p && /^version/{print $2; exit}' Cargo.toml)
          expected_version="${project_version}.r$(git rev-list --count HEAD).g$(git rev-parse --short HEAD)-1"
          actual_version=$(bsdtar -xOf "$package" .PKGINFO | sed -n 's/^pkgver = //p')
          if [ "$actual_version" != "$expected_version" ]; then
            echo "Unexpected package version: $actual_version (expected $expected_version)" >&2
            exit 1
          fi

          for entry in \
            usr/bin/lan-mouse \
            usr/lib/systemd/user/lan-mouse.service \
            usr/lib/firewalld/services/lan-mouse.xml \
            usr/share/applications/de.feschber.LanMouse.desktop \
            usr/share/icons/hicolor/scalable/apps/de.feschber.LanMouse.svg
          do
            if ! bsdtar -tf "$package" | grep -qx "$entry"; then
              echo "Missing package entry: $entry" >&2
              exit 1
            fi
          done

          pacman -Qip "$package"
          desktop-file-validate de.feschber.LanMouse.desktop
          target/release/lan-mouse --version

          namcap "$package" 2>&1 | tee /tmp/namcap.log
          if grep -q ' E: ' /tmp/namcap.log; then
            echo "namcap reported packaging errors" >&2
            exit 1
          fi

          echo "path=$(basename "$package")" >> "$GITHUB_OUTPUT"

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: lan-mouse-x86_64-pacman
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

  windows-package:
    runs-on: windows-2022
    steps:
      # the cache path must exist before the restore step runs
      - name: Create GTK directory
        run: mkdir C:\gtk-build\gtk\x64\release

      # keep in sync with rust.yml windows-gtk: the same key means checks and
      # packaging share one gtk toolchain cache
      - name: Restore GTK cache
        id: gtk-cache
        uses: actions/cache@v6
        with:
          path: C:\gtk-build\gtk\x64\release
          key: gtk-windows-vs2022-gvsbuild-2026.6.0

      - name: Build GTK
        if: steps.gtk-cache.outputs.cache-hit != 'true'
        run: |
          py -m venv .venv
          .venv\Scripts\activate.ps1
          py -m pip install gvsbuild==2026.6.0
          gvsbuild build --vs-ver vs2022 --msys-dir=C:\msys64 gtk4 libadwaita librsvg

      - uses: actions/checkout@v6

      - name: Configure GTK environment
        run: |
          echo "PKG_CONFIG=C:\gtk-build\gtk\x64\release\bin\pkgconf.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\gtk-build\gtk\x64\release\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Release build
        run: cargo build --release

      # portable package: the exe next to every gtk runtime dll, no installer
      - name: Create archive
        run: |
          mkdir "lan-mouse-windows"
          Get-ChildItem -Path "C:\gtk-build\gtk\x64\release\bin\*.dll" -File -Recurse | Copy-Item -Destination "lan-mouse-windows"
          Copy-Item -Path "target\release\lan-mouse.exe" -Destination "lan-mouse-windows"
          Compress-Archive -Path "lan-mouse-windows\*" -DestinationPath lan-mouse-windows-x86_64.zip

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: lan-mouse-x86_64-windows-portable
          path: lan-mouse-windows-x86_64.zip
          if-no-files-found: error
