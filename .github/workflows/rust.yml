name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: cargo fmt
        run: cargo fmt --check

  windows-gtk:
    name: Prepare GTK for Windows
    runs-on: windows-2022
    steps:
      - name: Create GTK directory
        run: mkdir C:\gtk-build\gtk\x64\release
      # keep in sync with nightly.yml windows-package, which shares this cache
      - name: Restore GTK cache
        id: gtk-cache
        uses: actions/cache@v6
        with:
          path: C:\gtk-build\gtk\x64\release
          key: gtk-windows-vs2022-gvsbuild-2026.6.0
      - name: Build GTK
        if: steps.gtk-cache.outputs.cache-hit != 'true'
        run: |
          py -m venv .venv
          .venv\Scripts\activate.ps1
          py -m pip install gvsbuild==2026.6.0
          gvsbuild build --vs-ver vs2022 --msys-dir=C:\msys64 gtk4 libadwaita librsvg

  ci:
    name: ${{ matrix.job }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - macos-15-intel
        job:
          - build
          - check
          - clippy
          - test
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install libx11-dev libxtst-dev libadwaita-1-dev libgtk-4-dev
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install gtk4 libadwaita imagemagick
      - name: Record macOS native lib versions for cache key
        if: runner.os == 'macOS'
        run: |
          echo "MACOS_LIB_VER=$(brew list --versions glib gtk4 libadwaita | tr '\n' '_')" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.MACOS_LIB_VER }}
      - name: cargo build
        if: matrix.job == 'build'
        run: cargo build

      - name: cargo check
        if: matrix.job == 'check'
        run: cargo check --workspace --all-targets --all-features

      - name: cargo test
        if: matrix.job == 'test'
        run: cargo test --workspace --all-features

      - name: cargo clippy
        if: matrix.job == 'clippy'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - uses: clechasseur/rs-clippy-check@v4
        if: matrix.job == 'clippy'
        with:
          args: --workspace --all-targets --all-features

  windows-ci:
    name: ${{ matrix.job }} windows-2022
    needs: windows-gtk
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        job:
          - build
          - check
          - clippy
          - test
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Restore GTK cache
        uses: actions/cache@v6
        with:
          path: C:\gtk-build\gtk\x64\release
          key: gtk-windows-vs2022-gvsbuild-2026.6.0
          fail-on-cache-miss: true
      - name: Configure GTK environment
        run: |
          echo "PKG_CONFIG=C:\gtk-build\gtk\x64\release\bin\pkgconf.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\gtk-build\gtk\x64\release\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: cargo build
        if: matrix.job == 'build'
        run: cargo build
      - name: cargo check
        if: matrix.job == 'check'
        run: cargo check --workspace --all-targets --all-features
      - name: cargo test
        if: matrix.job == 'test'
        run: cargo test --workspace --all-features
      - name: cargo clippy
        if: matrix.job == 'clippy'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - uses: clechasseur/rs-clippy-check@v4
        if: matrix.job == 'clippy'
        with:
          args: --workspace --all-targets --all-features
